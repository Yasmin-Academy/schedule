<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scheduler Embed Host (Local Test)</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 40px; }
      .box { max-width: 920px; margin: 0 auto; }
      .hint { color: #555; font-size: 14px; }
      .row { display:flex; gap:16px; flex-wrap:wrap; align-items:center; }
      code { background:#f3f4f6; padding:2px 6px; border-radius:6px; }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Scheduler Embed Host (Local Test)</h1>
      <p class="hint">
        This page is served from <code>http://localhost:5174</code> to simulate your marketing site (<code>domain.com</code>).
        It embeds the widget script from your scheduler origin (<code>http://localhost:8788</code> in dev).
      </p>

      <div class="row">
        <label>
          Base URL:
          <input id="baseUrl" value="http://localhost:8788" style="width: 280px;" />
        </label>
        <label>
          Event slug:
          <input id="eventSlug" value="demo-meeting" style="width: 200px;" />
        </label>
        <button id="apply">Apply</button>
      </div>

      <hr />

      <!-- Mount point: the widget JS will mount into this div -->
      <div
        id="mount"
        data-schedule
        data-event="demo-meeting"
        data-base-url="http://localhost:8788"
        data-lang="en"
      ></div>

      <!-- Widget script (served by the scheduler app) -->
      <script src="http://localhost:8788/widget/schedule-widget.js" defer></script>

      <script type="module">
        // Small helper to update attrs without reloading the whole page.
        // (This is a module script, so it won't leak globals in tools like Webstudio.)
        const mount = document.getElementById("mount");
        const baseUrl = document.getElementById("baseUrl");
        const eventSlug = document.getElementById("eventSlug");
        document.getElementById("apply").addEventListener("click", () => {
          mount.setAttribute("data-base-url", baseUrl.value.trim());
          mount.setAttribute("data-event", eventSlug.value.trim());
          // If the widget has already loaded, ask it to re-scan.
          window.ScheduleEmbed?.mountAll?.(document);
        });
      </script>
    </div>
  </body>
</html>
